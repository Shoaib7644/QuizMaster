spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/quizmaster
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
      show-sql: false
      properties:
        hibernate:
          format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          trust: "*"
        auth: true
        starttls:
          enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
    mvc:
      cors:
        allowed-origins: http://localhost:5173
        allowed-methods: GET, POST, PUT, DELETE, OPTIONS
        allowed-headers: "*"
        allow-credentials: true

app:
  jwt:
    secret: ${JWT_SECRET:cXVpem1hc3Rlci1zZWNyZXQta2V5LWNoYW5nZS1pbi1wcm9kdWN0aW9u}
    expiration: 86400000 # 24 hours in milliseconds

server:
  port: 8080

logging:
  level:
    root: info
    com.quizmaster: debug
    org.springframework.web: info
    org.hibernate.sql: debug
    org.hibernate.type.descriptor.sql: trace